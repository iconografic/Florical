<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FloriCalc — Admin</title>
  <style>
    :root {
      --bg: #0f0f14; --card: #1a1a24; --border: #2a2a38;
      --primary: #E040FB; --text: #f0eeff; --text2: #7a7a9a;
      --green: #4caf50; --red: #ef5350; --yellow: #ffc107;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 24px;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-box h1 { font-size: 24px; margin-bottom: 6px; }
    .login-box p  { color: var(--text2); font-size: 14px; margin-bottom: 28px; }

    /* Panel */
    #admin-panel { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 22px; }
    header .sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .stat-val { font-size: 28px; font-weight: 800; }
    .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .stat-val.green  { color: var(--green); }
    .stat-val.yellow { color: var(--yellow); }
    .stat-val.red    { color: var(--red); }

    /* Add user */
    .add-row {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .add-row input { flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; outline: none; }
    .add-row input:focus { border-color: var(--primary); }

    /* Table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
         text-transform: uppercase; letter-spacing: 0.7px; color: var(--text2);
         border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .code-badge {
      background: rgba(224,64,251,0.12); color: var(--primary);
      padding: 3px 10px; border-radius: 8px; font-weight: 700; font-size: 13px;
    }
    .status-badge {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .status-badge.active   { background: rgba(76,175,80,0.15); color: var(--green); }
    .status-badge.inactive { background: rgba(239,83,80,0.15); color: var(--red); }

    .date-text { font-size: 12px; color: var(--text2); }

    /* Buttons */
    .btn {
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-toggle-on  { background: rgba(239,83,80,0.15); color: var(--red); }
    .btn-toggle-off { background: rgba(76,175,80,0.15); color: var(--green); }
    .btn-del { background: rgba(255,255,255,0.06); color: var(--text2); }
    .btn-logout { background: rgba(255,255,255,0.06); color: var(--text2);
                  border: none; border-radius: 8px; padding: 8px 14px;
                  font-size: 13px; cursor: pointer; }

    /* Alert */
    .alert {
      display: none; padding: 12px 16px; border-radius: 10px;
      font-size: 14px; margin-bottom: 16px; font-weight: 600;
    }
    .alert.error   { background: rgba(239,83,80,0.12); color: var(--red); }
    .alert.success { background: rgba(76,175,80,0.12);  color: var(--green); }
    .alert.show    { display: block; }

    /* Input/pass */
    .input-pass {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 15px;
      outline: none; margin-bottom: 16px;
    }
    .input-pass:focus { border-color: var(--primary); }
    .btn-full { width: 100%; padding: 14px; font-size: 15px; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      table th:nth-child(3), table td:nth-child(3),
      table th:nth-child(4), table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Login del admin ── -->
<div id="login-screen">
  <div class="login-box">
    <h1>🌸 FloriCalc</h1>
    <p>Panel de Administración</p>
    <div id="login-alert" class="alert error">Contraseña incorrecta</div>
    <input type="password" class="input-pass" id="admin-pass" placeholder="Contraseña de admin" />
    <button class="btn btn-primary btn-full" onclick="adminLogin()">Entrar</button>
  </div>
</div>

<!-- ── Panel principal ── -->
<div id="admin-panel">
  <header>
    <div>
      <h1>🌸 FloriCalc Admin</h1>
      <div class="sub">Panel de control de accesos</div>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <div id="panel-alert" class="alert"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-val green" id="stat-total">0</div>
      <div class="stat-lbl">Total de cuentas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-active">0</div>
      <div class="stat-lbl">Cuentas activas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val red" id="stat-inactive">0</div>
      <div class="stat-lbl">Suspendidas</div>
    </div>
  </div>

  <!-- Agregar código -->
  <div class="add-row">
    <input type="text" id="new-code" placeholder="Nuevo código de acceso (ej: CLIENTE05)" maxlength="30"/>
    <button class="btn btn-primary" onclick="addUser()">+ Agregar</button>
  </div>

  <!-- Tabla de usuarios -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Negocio / Email</th>
          <th>Último acceso</th>
          <th>T&C</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="users-table"></tbody>
    </table>
  </div>
</div>

<script>
  let adminPass = '';

  async function adminLogin() {
    const pass = document.getElementById('admin-pass').value;
    if (!pass) return;

    const res  = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();

    if (data.ok) {
      adminPass = pass;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display  = 'block';
      loadUsers();
    } else {
      document.getElementById('login-alert').classList.add('show');
    }
  }

  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') adminLogin();
  });

  async function loadUsers() {
    const res   = await fetch('/api/admin/users', { headers: { 'x-admin-password': adminPass } });
    const users = await res.json();

    // Stats
    document.getElementById('stat-total').textContent    = users.length;
    document.getElementById('stat-active').textContent   = users.filter(u => u.active).length;
    document.getElementById('stat-inactive').textContent = users.filter(u => !u.active).length;

    // Tabla
    const tbody = document.getElementById('users-table');
    tbody.innerHTML = users.map(u => `
      <tr>
        <td><span class="code-badge">${u.code}</span></td>
        <td>
          <div style="font-weight:600;">${u.name || '—'}</div>
          <div style="font-size:12px;color:var(--text2);">${u.email || '—'}</div>
        </td>
        <td class="date-text">${u.last_login ? new Date(u.last_login).toLocaleString('es-MX') : 'Nunca'}</td>
        <td>${u.terms_accepted ? '✅' : '—'}</td>
        <td>
          <span class="status-badge ${u.active ? 'active' : 'inactive'}">
            ${u.active ? 'Activa' : 'Suspendida'}
          </span>
        </td>
        <td style="display:flex;gap:8px;">
          <button class="btn ${u.active ? 'btn-toggle-on' : 'btn-toggle-off'}"
            onclick="toggleUser(${u.id})">
            ${u.active ? 'Suspender' : 'Activar'}
          </button>
          <button class="btn btn-del" onclick="deleteUser(${u.id}, '${u.code}')">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }

  async function toggleUser(id) {
    await fetch(`/api/admin/users/${id}/toggle`, {
      method: 'PUT',
      headers: { 'x-admin-password': adminPass }
    });
    showAlert('Estado actualizado', 'success');
    loadUsers();
  }

  async function addUser() {
    const code = document.getElementById('new-code').value.trim();
    if (!code) return;
    const res  = await fetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPass },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('new-code').value = '';
      showAlert('Código agregado: ' + code.toUpperCase(), 'success');
      loadUsers();
    } else {
      showAlert(data.error || 'Error agregando código', 'error');
    }
  }

  document.getElementById('new-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') addUser();
  });

  async function deleteUser(id, code) {
    if (!confirm(`¿Eliminar el código "${code}" y todos sus datos? Esta acción es irreversible.`)) return;
    await fetch(`/api/admin/users/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': adminPass }
    });
    showAlert('Cuenta eliminada', 'success');
    loadUsers();
  }

  function showAlert(msg, type) {
    const el = document.getElementById('panel-alert');
    el.textContent = msg;
    el.className   = `alert ${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function logout() {
    adminPass = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display  = 'none';
    document.getElementById('admin-pass').value = '';
  }
</script>
</body>
</html>
